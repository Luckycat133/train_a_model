# 分类统计信息
category_info:
  classical:
    display_name: "古文"
    priority: 1
    description: "古典文学作品，包括诗词歌赋、文言文等"
    default_ratio: 0.4
    quality_weight: 1.0

  modern:
    display_name: "现代文"
    priority: 2
    description: "现代汉语文学作品和文章"
    default_ratio: 0.3
    quality_weight: 1.0

  baike:
    display_name: "百科"
    priority: 3
    description: "百科全书式的知识性内容"
    default_ratio: 0.2
    quality_weight: 1.0

  dialogue:
    display_name: "对话"
    priority: 4
    description: "对话形式的交互数据"
    default_ratio: 0.1
    quality_weight: 1.0

# 下载配置
download_settings:
  max_workers: 3
  timeout: 60
  retry_times: 3
  chunk_size: 8192
  verify_ssl: true
  user_agent: "LingmaoMoYun-DataDownloader/1.0"

# 数据处理配置
processing_settings:
  min_text_length: 10
  max_text_length: 4096
  remove_html: true
  remove_urls: true
  remove_emails: true
  normalize_whitespace: true
  enable_deduplication: true
  special_tokens:
    cls: "[CLS]"
    sep: "[SEP]"
    mask: "[MASK]"
    unk: "[UNK]"
    pad: "[PAD]"
    eod: "[EOD]"
    eos: "[EOS]"
    sop: "[SOP]"
    eop: "[EOP]"

# 数据集划分配置
split_config:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  shuffle_seed: 42

# 许可证说明
licenses:
  "Public Domain":
    description: "公共领域作品，无版权限制"

  "CC BY 4.0":
    description: "署名 - 允许商业和非商业使用，需注明作者"
    url: "https://creativecommons.org/licenses/by/4.0/"

  "CC BY-SA 4.0":
    description: "署名-相同方式共享"
    url: "https://creativecommons.org/licenses/by-sa/4.0/"

  "CC BY-NC 4.0":
    description: "署名-非商业性使用"
    url: "https://creativecommons.org/licenses/by-nc/4.0/"

  "CC BY-NC-SA 4.0":
    description: "署名-非商业性使用-相同方式共享"
    url: "https://creativecommons.org/licenses/by-nc-sa/4.0/"
