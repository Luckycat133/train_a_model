name: classical
version: "1.0.0"
description: "古文典籍数据集，包含论语、孟子、庄子、史记等古典文献"

source:
  url: "https://github.com/pigcv/guwen/archive/refs/heads/main.zip"
  path: "dataset/classical"
  download_method: "git"
  verify_ssl: true
  timeout: 600

format: jsonl

field_mapping:
  - source_field: "content"
    target_field: "text"
    transform: "strip"
  - source_field: "chapter"
    target_field: "chapter"
  - source_field: "book"
    target_field: "book"
  - source_field: "paragraph"
    target_field: "paragraph_index"

preprocessing:
  - step_type: filter
    field: "text"
    params:
      min_length: 20
      max_length: 1000
    condition: null
  
  - step_type: filter
    field: "text"
    params: {}
    condition: "text != ''"
  
  - step_type: filter
    field: "book"
    params: {}
    condition: null
  
  - step_type: transform
    field: "text"
    params:
      type: "strip"
  
  - step_type: transform
    field: "text"
    params:
      type: "regex_replace"
      pattern: "\\s+"
      replacement: ""

validation:
  - field: "text"
    rule_type: required
    message: "典籍内容不能为空"
  
  - field: "text"
    rule_type: range
    value:
      min: 10
      max: 1500
    message: "内容长度超出范围"
  
  - field: "book"
    rule_type: required
    message: "典籍名称缺失"

metadata:
  language: "zh"
  domain: "classical_literature"
  source: "guwen"
  license: "PD"
  period: "pre-qin_to_qing"
  format_version: "1.0"

tags:
  - classical
  - confucian
  - daoist
  - chinese_classics
  - ancient_prose

size: 30000
license: "Public Domain"
