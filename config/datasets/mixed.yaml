name: mixed
version: "1.0.0"
description: "混合数据集，整合古诗词和古文典籍，支持多来源加权采样训练"

source:
  url: null
  path: "dataset/mixed"
  download_method: "local"
  verify_ssl: false
  timeout: 0

format: jsonl

datasets:
  - name: "poetry"
    weight: 0.6
    source_path: "dataset/poetry.json"
  - name: "classical"
    weight: 0.4
    source_path: "dataset/classical"

mixing_config:
  shuffle: true
  seed: 42
  replacement: true
  stratified: true

field_mapping:
  - source_field: "text"
    target_field: "text"
  - source_field: "content"
    target_field: "text"
  - source_field: "title"
    target_field: "title"
  - source_field: "author"
    target_field: "author"
  - source_field: "dynasty"
    target_field: "dynasty"
  - source_field: "book"
    target_field: "book"
  - source_field: "chapter"
    target_field: "chapter"

preprocessing:
  - step_type: filter
    field: "text"
    params:
      min_length: 10
      max_length: 800
    condition: null
  
  - step_type: filter
    field: "text"
    params: {}
    condition: "text != ''"
  
  - step_type: transform
    field: "text"
    params:
      type: "strip"
  
  - step_type: transform
    field: "text"
    params:
      type: "regex_replace"
      pattern: "[\\r\\n]+"
      replacement: " "

validation:
  - field: "text"
    rule_type: required
    message: "内容不能为空"
  
  - field: "text"
    rule_type: range
    value:
      min: 5
      max: 1000
    message: "内容长度超出范围"

metadata:
  language: "zh"
  domain: "mixed_classical"
  sources:
    - poetry
    - classical
  weights:
    poetry: 0.6
    classical: 0.4
  license: "Mixed (see source datasets)"
  format_version: "1.0"
  created_at: "2024-01-01"
  purpose: "balanced_training"

tags:
  - mixed
  - balanced
  - classical_chinese
  - multi_source
  - chinese_literature

size: 80000
license: "Mixed"
