name: poetry
version: "1.0.0"
description: "古诗词数据集，包含唐诗、宋词、元曲等古典诗歌作品"

source:
  url: "https://github.com/chinese-poetry/chinese-poetry/releases/download/v1.0/poetry.json"
  path: "dataset/poetry.json"
  download_method: "http"
  verify_ssl: true
  timeout: 300

format: json

field_mapping:
  - source_field: "content"
    target_field: "text"
    transform: "strip"
  - source_field: "title"
    target_field: "title"
  - source_field: "author"
    target_field: "author"
  - source_field: "dynasty"
    target_field: "dynasty"

preprocessing:
  - step_type: filter
    field: "text"
    params:
      min_length: 10
      max_length: 500
    condition: null
  
  - step_type: filter
    field: "text"
    params: {}
    condition: "text != ''"
  
  - step_type: transform
    field: "text"
    params:
      type: "strip"
  
  - step_type: transform
    field: "title"
    params:
      type: "strip"
  
  - step_type: transform
    field: "author"
    params:
      type: "strip"

validation:
  - field: "text"
    rule_type: required
    message: "诗歌内容不能为空"
  
  - field: "text"
    rule_type: range
    value:
      min: 5
      max: 600
    message: "诗歌长度超出范围"
  
  - field: "author"
    rule_type: required
    message: "作者信息缺失"

metadata:
  language: "zh"
  domain: "poetry"
  source: "chinese-poetry"
  license: "CC BY-NC-SA 4.0"
  format_version: "1.0"

tags:
  - poetry
  - tang_poetry
  - song_poetry
  - classical_chinese
  - chinese_literature

size: 50000
license: "CC BY-NC-SA 4.0"
