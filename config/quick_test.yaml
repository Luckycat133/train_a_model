# Quick Test Configuration
# Lingmao Moyun - Minimal Training for Demo
experiment_type: pretrain
experiment_name: quick_test
seed: 42
version: "0.8.5"

# Small Model Architecture
model:
  d_model: 128
  nhead: 2
  num_layers: 2
  dim_feedforward: 512
  dropout: 0.1
  max_len: 256
  vocab_size: 50000
  use_weight_tying: true
  use_sliding_window: false
  use_mla: false
  use_moe: false
  mode: modern

# Training
training:
  context_length: 64
  batch_size: 2
  learning_rate: 1e-4
  epochs: 3
  accumulation_steps: 1
  max_grad_norm: 1.0
  weight_decay: 0.0
  checkpoint_every: 1
  warmup_steps: 50
  total_training_steps: 300
  min_lr_ratio: 0.1
  label_smoothing: 0.0
  use_amp: false
  use_compile: false
  use_gradient_checkpointing: false
  log_stats_interval: 10

# Dataset
dataset:
  train_file: dataset/sample_train.jsonl
  test_file: null
  val_file: null
  data_format: jsonl
  stride: 32
  max_chunks: null
  batch_load_size: 10

# Tokenizer
tokenizer:
  path: tokenizer.json
  vocab_size: 16000

# Paths
paths:
  log_dir: logs
  log_subdir: quick_test
  model_save_dir: model_weights/quick_test
