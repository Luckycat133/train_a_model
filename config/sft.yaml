# Supervised Fine-Tuning (SFT) Configuration Template
# Lingmao Moyun Project

experiment_type: sft
experiment_name: sft_baseline
seed: 42
version: "0.8.5"

# Model Architecture Configuration
model:
  d_model: 512
  nhead: 8
  num_layers: 6
  dim_feedforward: 2048
  dropout: 0.05  # Lower dropout for fine-tuning
  max_len: 512
  vocab_size: 50000
  
  # Advanced Architecture Options
  num_kv_heads: null  # null for MHA, set < nhead for GQA
  head_dim: 64
  use_weight_tying: true
  use_sliding_window: false
  swa_window_size: 512
  use_mla: false
  mla_latent_dim: 128
  mla_num_latent_heads: 4
  use_moe: false
  num_experts: 8
  top_k: 2
  mode: modern  # modern or legacy

# Training Hyperparameters
training:
  context_length: 256  # Shorter context for instruction following
  batch_size: 16
  learning_rate: 2.0e-5  # Lower LR for fine-tuning
  epochs: 3
  accumulation_steps: 2
  max_grad_norm: 1.0
  weight_decay: 0.01
  checkpoint_every: 1
  warmup_steps: 100  # Shorter warmup for fine-tuning
  total_training_steps: 1000
  min_lr_ratio: 0.1
  label_smoothing: 0.05  # Light label smoothing
  use_amp: true
  use_compile: false
  use_gradient_checkpointing: false  # Usually not needed for smaller SFT models
  log_stats_interval: 50

# Dataset Configuration
dataset:
  stride: 256
  max_chunks: null
  memmap_threshold: 10000000
  batch_load_size: 100
  sample_array_init_size: 1000
  
  # Data Files (customize these paths)
  train_file: dataset/sft_train.jsonl
  val_file: dataset/sft_val.jsonl
  test_file: null
  data_format: jsonl  # SFT typically uses structured format

# Memory and Performance Settings
memory:
  max_cache_size: 10000
  memory_map_suffix: ".dat"
  gpu_memory_frac: 0.90
  cpu_offload: false
  use_fused_adamw: true

# Night Mode Power Saving
night_mode:
  enabled: false
  start_hour: 21
  end_hour: 8
  batch_divisor: 2
  gpu_memory_frac: 0.50
  cpu_cores_divisor: 2

# Tokenizer Configuration
tokenizer:
  path: tokenizer.json
  cache_maxsize: 16384
  vocab_size: 16000
  special_tokens:
    - "<pad>"
    - "<unk>"
    - "<bos>"
    - "<eos>"
    - "<sep>"
    - "<cls>"
  use_bpe: false
  bpe_vocab_size: 32768
  bpe_model_type: unigram
  char_coverage: 1.0
  byte_fallback: false

# Paths Configuration
paths:
  log_dir: logs
  log_subdir: sft
  model_save_dir: model_weights/sft
  checkpoint_name_prefix: checkpoint_epoch
  best_model_name: best_model
  final_model_name_prefix: final_model

# Tags for experiment tracking
tags:
  - sft
  - fine-tuning
  - instruction-following
